name: Unit Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore
      - run: dotnet build --no-restore

      - name: Run Unit Tests
        run: dotnet test --no-build --filter Category=Unit
